services:
  postgres:
    build:
      context: ./infra/local-postgres
    image: lala-next-postgres-local:16-postgis-vector
    container_name: lala-next-postgres
    environment:
      POSTGRES_USER: ${LALA_POSTGRES_USER:-lala}
      POSTGRES_PASSWORD: ${LALA_POSTGRES_PASSWORD:?Set LALA_POSTGRES_PASSWORD for local development.}
      POSTGRES_DB: ${LALA_POSTGRES_DB:-lala}
    ports:
      - "${LALA_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - lala-next-postgres-data:/var/lib/postgresql/data

volumes:
  lala-next-postgres-data:
