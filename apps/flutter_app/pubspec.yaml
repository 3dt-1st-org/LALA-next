name: lala_next_app
description: LALA-next Flutter app shell wired to the Wave 1 FastAPI contract.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  lala_next_flutter_client_reference:
    path: ../../clients/flutter
  lala_next_flutter_client_generated:
    path: ../../clients/flutter_generated
  url_launcher: ^6.3.2
  webview_flutter: ^4.14.0
  geolocator: 14.0.2
  logto_dart_sdk: ^3.0.0
  web: ^1.1.1
  # C2: MVVM 기반(Riverpod). go_router/dio/json_serializable 은 실사용 시점(C3/B1.3)에 추가.
  flutter_riverpod: ^2.5.1
  # ONMU P0: StatefulShellRoute 기반 3-탭 하단 네비게이션.
  go_router: ^14.6.0
  # ONMU P3c: 커뮤니티 채팅 WebSocket 클라이언트(모바일+웹 공용).
  web_socket_channel: ^3.0.2
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  xml: ^6.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/lala-hwaseong-haenggung.png
