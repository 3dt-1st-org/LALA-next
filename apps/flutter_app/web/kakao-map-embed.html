<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LALA Kakao Map</title>
  <style>
    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #eaf2fb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .message {
      display: grid;
      width: 100%;
      height: 100%;
      place-items: center;
      color: #1a202c;
      font-weight: 900;
      text-align: center;
    }

    .lala-marker {
      display: flex;
      flex-direction: column;
      align-items: center;
	      gap: 5px;
	      cursor: pointer;
	      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
	      pointer-events: auto;
	      filter: drop-shadow(0 8px 18px rgba(15, 23, 42, 0.26));
	    }

    .lala-marker-name {
      max-width: 132px;
      padding: 5px 10px;
      border-radius: 12px;
	      background: rgba(17, 24, 39, .82);
      color: #ffffff;
      font-size: 10px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: 0 6px 18px rgba(15, 23, 42, .18);
    }

    .lala-marker-circle {
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 4px 14px rgba(15, 23, 42, .22);
      box-sizing: border-box;
    }

    .lala-marker-inner {
      display: grid;
      place-items: center;
      border-radius: 50%;
    }

    .lala-marker-label {
      display: grid;
      place-items: center;
      font-weight: 900;
      line-height: 1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="map" role="img" aria-label="LALA Kakao map"></div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const mapElement = document.getElementById("map");
      const appKey = params.get("appkey") || "";
      const centerLat = Number(params.get("lat") || "37.2823");
      const centerLng = Number(params.get("lng") || "127.0179");
      const level = Number(params.get("level") || "4");
      let places = [];

      try {
        places = JSON.parse(params.get("places") || "[]");
      } catch (_) {
        places = [];
      }

      function showMessage(message) {
        mapElement.innerHTML = "";
        const node = document.createElement("div");
        node.className = "message";
        node.textContent = message;
        mapElement.appendChild(node);
      }

      if (!appKey) {
        showMessage("현재 지도를 표시할 수 없습니다.");
        return;
      }

      const script = document.createElement("script");
      script.async = true;
      script.src = "https://dapi.kakao.com/v2/maps/sdk.js?appkey=" +
        encodeURIComponent(appKey) +
        "&libraries=services,clusterer&autoload=false";
      script.onload = drawMap;
      script.onerror = function () {
        showMessage("카카오 지도 로드에 실패했습니다.");
      };
      document.head.appendChild(script);

      function drawMap() {
        if (!window.kakao || !window.kakao.maps) {
          showMessage("카카오 지도 로드에 실패했습니다.");
          return;
        }

        window.kakao.maps.load(function () {
          mapElement.innerHTML = "";
          const center = new kakao.maps.LatLng(centerLat, centerLng);
          const map = new kakao.maps.Map(mapElement, {
            center: center,
            level: level
          });
          const circle = new kakao.maps.Circle({
            center: center,
            radius: 95,
            strokeWeight: 2,
            strokeColor: "#2B6CB0",
            strokeOpacity: 0.75,
            fillColor: "#2B6CB0",
            fillOpacity: 0.12
          });
          circle.setMap(map);

          let renderedPins = 0;
          let renderedClusters = 0;
          places.forEach(function (place) {
            const isCluster = Number(place.clusterCount || 0) > 1;
            const marker = buildMarker(place);
            marker.setAttribute("data-lala-place-id", String(place.id || ""));
            marker.setAttribute("data-lala-category", String(place.category || ""));
            if (isCluster) {
              marker.setAttribute("data-lala-cluster-count", String(place.clusterCount || ""));
              renderedClusters += 1;
            } else {
              renderedPins += 1;
            }
            marker.addEventListener("click", function () {
              if (window.LalaMap && window.LalaMap.postMessage) {
                window.LalaMap.postMessage(String(place.id || ""));
              }
            });
            const overlay = new kakao.maps.CustomOverlay({
	              position: new kakao.maps.LatLng(Number(place.lat), Number(place.lng)),
	              content: marker,
	              yAnchor: isCluster ? 0.5 : 1.0,
	              zIndex: place.selected ? 40 : (isCluster ? 20 : 30)
	            });
            overlay.setMap(map);
          });
          mapElement.setAttribute("data-lala-marker-pins", String(renderedPins));
          mapElement.setAttribute("data-lala-marker-clusters", String(renderedClusters));
          mapElement.setAttribute("data-lala-map-level", String(map.getLevel()));
          window.__lalaLastMapMarkerStats = {
            pins: renderedPins,
            clusters: renderedClusters,
            total: places.length,
            level: map.getLevel()
          };

          function postCameraIdle() {
            const nextCenter = map.getCenter();
            if (window.LalaMap && window.LalaMap.postMessage) {
              window.LalaMap.postMessage(JSON.stringify({
                type: "cameraIdle",
                lat: nextCenter.getLat(),
                lng: nextCenter.getLng(),
                level: map.getLevel()
              }));
            }
          }

          kakao.maps.event.addListener(map, "dragend", postCameraIdle);
          kakao.maps.event.addListener(map, "zoom_changed", postCameraIdle);

          window.setTimeout(function () {
            map.relayout();
            map.setCenter(center);
          }, 0);
        });
      }

	      function buildMarker(place) {
	        const isCluster = Number(place.clusterCount || 0) > 1;
	        const size = isCluster ? 48 : (place.selected ? 48 : 40);
	        const categoryColor = colorFor(place.category);
	        const marker = document.createElement("div");
	        marker.className = "lala-marker " + (isCluster ? "lala-marker-cluster" : "lala-marker-pin");
	        marker.title = place.name || "";
	        if (!isCluster) {
	          marker.setAttribute("data-lala-marker-shape", "pin");
	        }

	        if (place.selected && !isCluster) {
          const namePill = document.createElement("div");
          namePill.className = "lala-marker-name";
          namePill.textContent = shortName(place.name);
          marker.appendChild(namePill);
        }

	        if (isCluster) {
	          const clusterBubble = document.createElement("div");
	          clusterBubble.className = "lala-marker-circle";
	          clusterBubble.style.width = size + "px";
	          clusterBubble.style.height = size + "px";
	          clusterBubble.style.border = "3px solid " + categoryColor;
	          clusterBubble.style.boxShadow = "0 8px 20px rgba(15, 23, 42, .28)";
	          const label = document.createElement("div");
	          label.className = "lala-marker-label";
	          label.style.color = clusterTextColorFor(place.category);
	          label.style.fontSize = "14px";
	          label.textContent = String(place.clusterCount);
	          clusterBubble.appendChild(label);
	          marker.appendChild(clusterBubble);
	        } else {
	          const pin = document.createElement("div");
	          pin.style.position = "relative";
	          pin.style.width = size + "px";
	          pin.style.height = (size + 12) + "px";
	          pin.style.display = "grid";
	          pin.style.placeItems = "start center";
	          const tail = document.createElement("div");
	          tail.style.position = "absolute";
	          tail.style.left = "50%";
	          tail.style.bottom = "4px";
	          tail.style.width = "15px";
	          tail.style.height = "15px";
	          tail.style.background = categoryColor;
	          tail.style.borderRight = "3px solid #ffffff";
	          tail.style.borderBottom = "3px solid #ffffff";
	          tail.style.borderRadius = "2px 0 5px 0";
	          tail.style.transform = "translateX(-50%) rotate(45deg)";
	          const circle = document.createElement("div");
	          circle.className = "lala-marker-circle";
	          circle.style.position = "relative";
	          circle.style.width = size + "px";
	          circle.style.height = size + "px";
	          circle.style.background = categoryColor;
	          circle.style.border = "3px solid #ffffff";
	          circle.style.boxShadow = "inset 0 -8px 16px rgba(15, 23, 42, .12)";
	          const label = document.createElement("div");
	          label.className = "lala-marker-label";
	          label.style.color = markerTextColorFor(place.category);
	          label.style.fontSize = place.selected ? "14px" : "12px";
	          label.innerHTML = iconSvgFor(place.category);
	          circle.appendChild(label);
	          pin.appendChild(tail);
	          pin.appendChild(circle);
	          marker.appendChild(pin);
	        }
	        return marker;
	      }

      function colorFor(category) {
        if (category === "attraction") return "#C53030";
        if (category === "restaurant") return "#F5C842";
        if (category === "event") return "#2B6CB0";
        if (category === "culture_venue") return "#0F766E";
        return "#1A202C";
      }

      function markerTextColorFor(category) {
        return category === "restaurant" ? "#1A202C" : "#ffffff";
      }

      function clusterTextColorFor(category) {
        return category === "restaurant" ? "#6B4F0D" : colorFor(category);
      }

      function shortName(name) {
        name = String(name || "장소");
        return name.length > 14 ? name.slice(0, 14) + "..." : name;
      }

      function iconSvgFor(category) {
	        if (category === "restaurant") {
	          return '<svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path d="M7 3v8M5 3v8M9 3v8M5 11h4v10M16 3v18M16 3c3 2 4 5 3 9h-3" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
	        }
	        if (category === "event") {
	          return '<svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><rect x="4" y="5" width="16" height="15" rx="2.5" fill="none" stroke="currentColor" stroke-width="2.2"/><path d="M8 3v4M16 3v4M4 10h16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>';
	        }
	        return '<svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path d="M4 10h16L12 4 4 10ZM6 10v8M10 10v8M14 10v8M18 10v8M4 20h16" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/></svg>';
	      }
    })();
  </script>
</body>
</html>
