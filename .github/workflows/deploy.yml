name: Deploy to EC2

# CI(ci.yml)가 main 브랜치에서 성공하면 AWS SSM Run Command로 EC2에 자동 배포.
# SSM 사용 이유: GitHub Actions IP(7,216대역)를 보안그룹에 추가 불가 →
# 포트 22 없이 IAM 인증(OIDC, 장기 키 없음)으로 명령 실행.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write   # OIDC 토큰 발급 필요
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::292216133883:role/lala-next-github-deploy
          aws-region: us-east-1

      - name: Deploy via SSM Run Command
        env:
          INSTANCE_ID: i-0a15ffbfa381a5843
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters workingDirectory=/opt/lala-next,commands='["set -euo pipefail","export HOME=/root","git config --global --add safe.directory /opt/lala-next","git fetch origin main","git reset --hard origin/main","source .venv/bin/activate","pip install -e . -q","systemctl restart lala-next"]' \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $CMD_ID"
          # 결과 대기 (최대 180초)
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'Status' --output text)
            if [ "$STATUS" = "Success" ]; then
              echo "=== SSM deploy SUCCESS ==="
              aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text
              exit 0
            fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "=== SSM deploy $STATUS ==="
              aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text
              exit 1
            fi
            sleep 3
          done
          echo "Timed out waiting for SSM command"
          exit 1

      - name: Health check
        run: |
          set -euo pipefail
          for i in $(seq 1 15); do
            if curl -sf https://api.lala-next.cloud/healthz > /dev/null 2>&1; then
              echo "Health check OK"
              curl -s https://api.lala-next.cloud/readyz | python3 -c "import sys,json;d=json.loads(sys.stdin.read());print('overall:', d['data']['mode']['overall'])"
              exit 0
            fi
            sleep 2
          done
          echo "Health check FAILED"
          exit 1
