name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  api-tests:
    name: API tests and safety contracts
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest apps/api/tests

      - name: Run worker dry-run smoke
        shell: pwsh
        run: .\scripts\windows\smoke_workers.ps1 -Python python

      - name: Verify PowerShell scripts parse
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $scripts = Get-ChildItem -Path scripts/windows -Filter *.ps1
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile(
              $script.FullName,
              [ref]$tokens,
              [ref]$errors
            )
            if ($errors) {
              throw "PowerShell parse failed for $($script.FullName): $($errors[0].Message)"
            }
          }
