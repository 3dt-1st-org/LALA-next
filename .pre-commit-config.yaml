# LALA-next pre-commit hooks (로컬/CI 동일).
# ruff/detect-secrets/pre-commit 자체는 pyproject.toml dev 그룹 + pre-commit 프레임워크로 구동.
# 설치: uv sync --extra dev && uv run pre-commit install
repos:
  # ruff는 프로젝트 pyproject.toml 설정을 그대로 쓰도록 local 훅(uv run)으로 구동 (버전 드리프트 방지).
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (--fix)
        entry: uv run ruff check --fix --force-exclude
        language: system
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types: [python]
        require_serial: true

  # 시크릿 누출 방지 (.secrets.baseline 으로 기존 허용목록 관리).
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: '(^|/)\.env(\..*)?$'

  # 일반 텍스트/메타 검증.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  # 참고: flutter analyze 훅은 main.dart(9,812줄) 정리(C3) 후 추가 예정.
  # 현재는 CI 의 verify_flutter_app.ps1 이 Flutter 게이트를 담당.
